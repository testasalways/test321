name: Bsc

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    env:
      BSC_RPC_URL: ${{ secrets.BSC_RPC_URL }}
      BSC_WALLET_PRIVATE_KEY: ${{ secrets.BSC_WALLET_PRIVATE_KEY }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      # MAIN_WALLET_ADDRESS: ${{ secrets.BSC_MAIN_WALLET_ADDRESS }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4.1.1
        with:
          repository: ${{ secrets.BSC_BOT_REPO_URL }}
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: yarn install
        run: yarn install --frozen-lockfile

      # - name: discovery
      #   run: yarn pools || true

      - name: tokens.json
        run: cat temp/tokens.json | jq

      - run: yarn trade

      - name: trades.json
        run: cat temp/trades.json | jq

      # - run: yarn prepare:wallet

      - name: exit
        run: |
          swaps=$(cat temp/trades.json | jq -r '.swaps')
          if [[ -z "$swaps" || "$swaps" == "0" ]]; then
            exit 1
          fi
        if: always()

  restart:
    runs-on: ubuntu-latest
    needs: start
    if: success() || failure()
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: restart
        run: gh workflow run bsc.yml
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
