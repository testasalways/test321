name: Claim fees

on:
  schedule:
    - cron: '0 8 * * *'

  workflow_dispatch:

jobs:
  claim-protocol-fees:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ secrets.GOR_BOT_REPO_URL }}
          token: ${{ secrets.GH_TOKEN }}
      
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: yarn cache
        uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ~/.cache/yarn
          key: fees-yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            fees-yarn-${{ runner.os }}-

      - name: yarn install
        run: yarn install --frozen-lockfile

      - name: yarn claim:fees
        env:
          RPC_URL: ${{ secrets.DEFAULT_RPC }}
          COOK_AUTHORITY_LIVE_JSON: ${{ secrets.COOK_AUTHORITY_LIVE_JSON }}
        run: yarn claim:fees
