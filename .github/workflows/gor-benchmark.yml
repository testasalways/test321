name: Gor Benchmark

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    env:
      DEFAULT_RPC: ${{ secrets.DEFAULT_RPC }}
      ALT_RPC_LIST: ${{ secrets.ALT_RPC_LIST }}
      GORBAGANA_WALLET_PRIVATE_KEY: ${{ secrets.GORBAGANA_WALLET_PRIVATE_KEY }}
      DEBUG: false

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ secrets.GOR_BOT_REPO_URL }}
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: yarn cache
        uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ~/.cache/yarn
          key: gor-benchmark-yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            gor-benchmark-yarn-${{ runner.os }}-

      - name: yarn install
        run: yarn install --frozen-lockfile

      - run: yarn bench:tpu 10
