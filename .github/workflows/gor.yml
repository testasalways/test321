name: Gor

on:
  workflow_dispatch:

jobs:
  start:
    name: start
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEFAULT_RPC: ${{ secrets.DEFAULT_RPC }}
      ALT_RPC_LIST: ${{ secrets.ALT_RPC_LIST }}
      GORBAGANA_WALLET_PRIVATE_KEY: ${{ secrets.GORBAGANA_WALLET_PRIVATE_KEY }}
      MAIN_WALLET_ADDRESS: ${{ secrets.MAIN_WALLET_ADDRESS }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ARB_VERBOSE: ${{ vars.GOR_ARB_VERBOSE }}
      DEBUG: false

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ secrets.GOR_BOT_REPO_URL }}
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: yarn cache
        uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ~/.cache/yarn
          key: gor-yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            gor-yarn-${{ runner.os }}-

      - name: yarn install
        run: yarn install --frozen-lockfile

      - name: discovery
        run: yarn pools || true

      - name: tokens.json
        run: |
          f=temp/tokens.json
          if [[ ! -s "$f" ]]; then
            echo "::error::tokens.json missing or empty file"
            exit 1
          fi
          jq -e 'type == "array" and length > 0' "$f" >/dev/null || {
            echo "::error::tokens.json must be a non-empty JSON array"
            exit 1
          }
          jq . "$f"

      - run: yarn trade

      - name: trades.json
        run: cat temp/trades.json | jq

      - run: yarn prepare:wallet

      - name: exit
        run: |
          swaps=$(cat temp/trades.json | jq -r '.swaps')
          if [[ -z "$swaps" || "$swaps" == "0" ]]; then
            exit 1
          fi
        if: always()

  restart:
    runs-on: ubuntu-latest
    needs: start
    if: success() || failure()
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: restart
        run: gh workflow run gor.yml
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
