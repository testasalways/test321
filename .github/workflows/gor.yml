name: Gor

on:
  workflow_dispatch:

jobs:
  start:
    name: start (trashdaq=${{ matrix.useTrashdaq }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        useTrashdaq: [false]
    env:
      DEFAULT_RPC: ${{ secrets.DEFAULT_RPC }}
      ALT_RPC_LIST: ${{ secrets.ALT_RPC_LIST }}
      GORBAGANA_WALLET_PRIVATE_KEY: ${{ secrets.GORBAGANA_WALLET_PRIVATE_KEY }}
      MAIN_WALLET_ADDRESS: ${{ secrets.MAIN_WALLET_ADDRESS }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ARB_VERBOSE: ${{ vars.GOR_ARB_VERBOSE }}
      DEBUG: false

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ secrets.GOR_BOT_REPO_URL }}
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: yarn cache
        uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ~/.cache/yarn
          key: gor-yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            gor-yarn-${{ runner.os }}-

      - name: yarn install
        run: yarn install --frozen-lockfile

      # https://docs.gorbagana.wtf/operating-and-rpc/running-your-rpc-node.html
      # Stack: https://github.com/gorbagana-dev/gorbagana-rpc (gorchain-rpc)
      - name: set up rpc
        env:
          GORBAGANA_RPC_REPO: https://github.com/gorbagana-dev/gorbagana-rpc.git
          GORBAGANA_RPC_REF: main
          HEALTH_TIMEOUT_SECONDS: '600'
        run: bash "${{ github.workspace }}/rpc/start-rpc.sh"
        
      - name: update config
        run: jq --argjson td '${{ matrix.useTrashdaq }}' '.useTrashdaq = $td' config.json > tmp && mv tmp config.json

      - name: discovery
        run: yarn pools || true

      - name: tokens.json
        run: cat temp/tokens.json | jq

      - run: yarn trade

      - name: trades.json
        run: cat temp/trades.json | jq

      - run: yarn prepare:wallet

      - name: exit
        run: |
          swaps=$(cat temp/trades.json | jq -r '.swaps')
          if [[ -z "$swaps" || "$swaps" == "0" ]]; then
            exit 1
          fi
        if: always()

  restart:
    runs-on: ubuntu-latest
    needs: start
    if: success() || failure()
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: restart
        run: gh workflow run gor.yml
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
